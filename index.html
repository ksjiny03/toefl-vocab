<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEFL 단어장 90일</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: #1e3a5f; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }
  header .stats { font-size: 0.82rem; opacity: 0.85; }

  .tab-bar { background: white; display: flex; border-bottom: 2px solid var(--border); padding: 0 16px; overflow-x: auto; }
  .tab { padding: 12px 18px; cursor: pointer; font-weight: 600; font-size: 0.88rem; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: all .2s; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .container { max-width: 860px; margin: 0 auto; padding: 20px 14px; }

  /* ── Day Selector ───────────────────────────────────── */
  .day-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 7px; margin-bottom: 20px; }
  .day-btn { padding: 9px 4px; text-align: center; border: 2px solid var(--border); border-radius: 9px; cursor: pointer; font-size: 0.78rem; font-weight: 600; background: white; transition: all .15s; position: relative; }
  .day-btn:hover { border-color: var(--primary); color: var(--primary); }
  .day-btn.active { background: #1e3a5f; color: white; border-color: #1e3a5f; }
  .day-btn .progress-dot { position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; background: var(--success); }
  .day-btn .count { font-size: 0.68rem; opacity: 0.75; }

  /* ── 단어집 View ─────────────────────────────────────── */
  .book-header {
    background: #1e3a5f;
    color: white;
    padding: 18px 24px;
    border-radius: 14px 14px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
  }
  .book-header .day-title { font-size: 2rem; font-weight: 900; letter-spacing: 2px; }
  .book-header .day-sub { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }
  .book-header .logo { font-size: 0.85rem; opacity: 0.7; text-align: right; }

  .word-book { background: white; border-radius: 0 0 14px 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden; }
  .word-entry { display: flex; border-bottom: 1px solid var(--border); padding: 18px 20px; gap: 0; transition: background .1s; }
  .word-entry:last-child { border-bottom: none; }
  .word-entry:hover { background: #f8fafc; }

  .entry-left { width: 190px; min-width: 190px; padding-right: 20px; border-right: 2px solid var(--border); }
  .entry-num { font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
  .entry-word { font-size: 1.35rem; font-weight: 800; color: var(--text); line-height: 1.2; }
  .entry-word em { font-style: normal; color: var(--primary); }

  .entry-right { flex: 1; padding-left: 20px; }
  .entry-meaning-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .entry-pos { font-size: 0.82rem; font-weight: 700; color: var(--primary); background: #dbeafe; padding: 2px 8px; border-radius: 5px; }
  .entry-pos.adj { color: #7c3aed; background: #ede9fe; }
  .entry-pos.n { color: #0891b2; background: #cffafe; }
  .entry-pos.adv { color: #059669; background: #d1fae5; }
  .entry-meaning { font-size: 1.05rem; font-weight: 700; color: var(--text); }

  .entry-example { font-size: 0.88rem; color: var(--text); line-height: 1.65; margin-bottom: 4px; }
  .entry-example strong { color: #1e3a5f; }
  .entry-example-ko { font-size: 0.82rem; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }

  .entry-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 0.73rem; font-weight: 600; padding: 2px 9px; border: 1.5px solid var(--border); border-radius: 20px; color: var(--muted); }
  .tag.known { border-color: var(--success); color: var(--success); background: #f0fdf4; }

  /* ── Flashcard ────────────────────────────────────────── */
  .flashcard-area { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .card-counter { font-size: 0.88rem; color: var(--muted); }
  .progress-bar { width: 100%; max-width: 480px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .3s; }

  .flashcard { width: 100%; max-width: 480px; height: 270px; perspective: 1000px; cursor: pointer; user-select: none; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; box-shadow: 0 6px 24px rgba(0,0,0,.1); }
  .card-front { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); color: white; }
  .card-back { background: white; transform: rotateY(180deg); border: 2px solid var(--border); }
  .card-front .word { font-size: 2.2rem; font-weight: 800; text-align: center; }
  .card-front .pos-badge { font-size: 0.9rem; margin-top: 8px; background: rgba(255,255,255,.2); padding: 3px 12px; border-radius: 20px; }
  .card-front .hint { font-size: 0.78rem; opacity: 0.55; margin-top: 18px; }
  .card-back .back-word { font-size: 0.95rem; color: var(--muted); margin-bottom: 8px; }
  .card-back .back-meaning { font-size: 1.55rem; font-weight: 800; color: var(--primary); text-align: center; }
  .card-back .back-example { font-size: 0.82rem; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.6; font-style: italic; }

  .card-actions { display: flex; gap: 10px; }
  .btn { padding: 11px 24px; border: none; border-radius: 11px; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-know { background: var(--success); color: white; }
  .btn-know:hover { background: #16a34a; transform: translateY(-1px); }
  .btn-dontknow { background: var(--danger); color: white; }
  .btn-dontknow:hover { background: #dc2626; transform: translateY(-1px); }
  .btn-skip { background: var(--border); color: var(--muted); }
  .btn-skip:hover { background: #cbd5e1; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

  /* ── Quiz ─────────────────────────────────────────────── */
  .quiz-area { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .quiz-question { width: 100%; max-width: 540px; background: white; border-radius: 18px; padding: 34px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.07); }
  .quiz-word { font-size: 1.9rem; font-weight: 800; color: #1e3a5f; }
  .quiz-pos { font-size: 0.88rem; color: var(--muted); margin-top: 5px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; width: 100%; max-width: 540px; }
  .quiz-opt { padding: 15px; background: white; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 0.97rem; font-weight: 600; text-align: center; transition: all .15s; }
  .quiz-opt:hover:not(.answered) { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
  .quiz-opt.correct { background: #dcfce7; border-color: var(--success); color: #166534; }
  .quiz-opt.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
  .quiz-score { font-size: 0.88rem; color: var(--muted); }
  .result-screen { text-align: center; padding: 40px 20px; }
  .result-screen h2 { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
  .score-big { font-size: 3.2rem; font-weight: 900; color: #1e3a5f; }

  /* ── Stats ────────────────────────────────────────────── */
  .stats-card { background: white; border-radius: 14px; padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 14px; }
  .stats-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; }

  .hidden { display: none !important; }

  @media (max-width: 520px) {
    .entry-left { width: 130px; min-width: 130px; }
    .entry-word { font-size: 1.1rem; }
    .entry-meaning { font-size: 0.95rem; }
    .quiz-options { grid-template-columns: 1fr; }
    .day-grid { grid-template-columns: repeat(auto-fill, minmax(70px,1fr)); }
  }
</style>
</head>

ord": "★transform", "pos": "v.", "meaning": "변형시키다 [복습]", "example": "The internet has transformed communication."}, {"day": "Day 90", "no": "28", "word": "★transit", "pos": "n.", "meaning": "통과, 교통 [복습]", "example": "Public transit reduces carbon emissions."}, {"day": "Day 90", "no": "29", "word": "★transmit", "pos": "v.", "meaning": "전송하다 [복습]", "example": "Viruses transmit through various means."}, {"day": "Day 90", "no": "30", "word": "★transport", "pos": "v./n.", "meaning": "운송하다/운송 [복습]", "example": "Blood transports oxygen throughout the body."}, {"day": "Day 90", "no": "31", "word": "★trend", "pos": "n.", "meaning": "추세 [복습]", "example": "The trend shows increasing temperatures."}, {"day": "Day 90", "no": "32", "word": "★trigger", "pos": "v./n.", "meaning": "촉발하다/방아쇠 [복습]", "example": "Stress can trigger anxiety disorders."}, {"day": "Day 90", "no": "33", "word": "★ultimate", "pos": "adj.", "meaning": "궁극적인 [복습]", "example": "The ultimate goal is to cure the disease."}, {"day": "Day 90", "no": "34", "word": "★undergo", "pos": "v.", "meaning": "겪다 [복습]", "example": "Patients undergo surgery to remove tumors."}, {"day": "Day 90", "no": "35", "word": "★underlie", "pos": "v.", "meaning": "~의 기저에 있다 [복습]", "example": "Several factors underlie the problem."}, {"day": "Day 90", "no": "36", "word": "★undertake", "pos": "v.", "meaning": "착수하다 [복습]", "example": "The team undertook a comprehensive study."}, {"day": "Day 90", "no": "37", "word": "★uniform", "pos": "adj./n.", "meaning": "균일한/유니폼 [복습]", "example": "The distribution should be uniform."}, {"day": "Day 90", "no": "38", "word": "★unify", "pos": "v.", "meaning": "통합하다 [복습]", "example": "Einstein sought to unify the forces of nature."}, {"day": "Day 90", "no": "39", "word": "★unique", "pos": "adj.", "meaning": "고유한 [복습]", "example": "Each fingerprint is unique."}, {"day": "Day 90", "no": "40", "word": "★utilize", "pos": "v.", "meaning": "활용하다 [복습]", "example": "Scientists utilize advanced technology."}];

let state = {
  currentTab: 'book',
  selectedDay: 'Day 01',
  cardIndex: 0,
  flipped: false,
  known: JSON.parse(localStorage.getItem('toefl_known') || '{}'),
  quizScore: 0,
  quizTotal: 0,
  quizIndex: 0,
  quizWords: [],
  showResult: false,
  quizDay: 'Day 01',
};

function saveKnown() { localStorage.setItem('toefl_known', JSON.stringify(state.known)); }
function getDayWords(day) { return VOCAB.filter(w => w.day === day); }
function getAllDays() { return [...new Set(VOCAB.map(w => w.day))].sort(); }
function getTotalKnown() { return Object.keys(state.known).filter(k => state.known[k]).length; }

function updateHeader() {
  const total = VOCAB.length;
  const known = getTotalKnown();
  const pct = Math.round(known / total * 100);
  document.getElementById('headerStats').textContent = `암기 ${known} / ${total} (${pct}%)`;
}

function posClass(pos) {
  if (!pos) return '';
  const p = pos.toLowerCase();
  if (p.startsWith('adj')) return 'adj';
  if (p.startsWith('n')) return 'n';
  if (p.startsWith('adv')) return 'adv';
  return '';
}

function highlightWord(sentence, word) {
  if (!sentence || !word) return sentence || '';
  const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return sentence.replace(new RegExp('(' + escaped + '(?:s|ed|ing|ly|tion|ment|er|est)?)', 'gi'),
    '<strong>$1</strong>');
}

function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Day Selector ──────────────────────────────────────────────
function dayGrid(activeDay) {
  return getAllDays().map(d => {
    const dWords = getDayWords(d);
    const dKnown = dWords.filter(x => state.known[`${x.day}_${x.word}`]).length;
    const allDone = dKnown === dWords.length;
    return `<div class="day-btn ${d === activeDay ? 'active' : ''}" onclick="selectDay('${d}')">${d}${allDone ? '<div class=\'progress-dot\'></div>' : ''}<div class="count">${dKnown}/${dWords.length}</div></div>`;
  }).join('');
}

function selectDay(day) {
  state.selectedDay = day;
  state.cardIndex = 0;
  state.flipped = false;
  renderCurrent();
}

// ── 단어집 Tab ─────────────────────────────────────────────────
function renderBook() {
  const words = getDayWords(state.selectedDay);
  const entries = words.map((w, i) => {
    const key = `${w.day}_${w.word}`;
    const isKnown = state.known[key];
    const highlighted = highlightWord(escH(w.example), w.word);
    return `
    <div class="word-entry">
      <div class="entry-left">
        <div class="entry-num">${String(i+1).padStart(2,'0')}</div>
        <div class="entry-word">${escH(w.word)}</div>
      </div>
      <div class="entry-right">
        <div class="entry-meaning-line">
          <span class="entry-pos ${posClass(w.pos)}">${escH(w.pos)}</span>
          <span class="entry-meaning">${escH(w.meaning)}</span>
        </div>
        <div class="entry-example">${highlighted}</div>
        <div class="entry-tags">
          <span class="tag ${isKnown ? 'known' : ''}" style="cursor:pointer" onclick="toggleKnown('${key}',this)">${isKnown ? '✓ 암기' : '미암기'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="day-grid">${dayGrid(state.selectedDay)}</div>
    <div class="book-header">
      <div>
        <div class="day-title">${state.selectedDay.toUpperCase()}</div>
        <div class="day-sub">${words.length}개 단어 · 암기 ${words.filter(w=>state.known[`${w.day}_${w.word}`]).length}개</div>
      </div>
      <div class="logo">Santa × TOEFL<br>90-Day Vocab</div>
    </div>
    <div class="word-book">${entries}</div>`;
}

function toggleKnown(key, el) {
  state.known[key] = !state.known[key];
  saveKnown();
  el.className = `tag ${state.known[key] ? 'known' : ''}`;
  el.textContent = state.known[key] ? '✓ 암기' : '미암기';
  updateHeader();
  // update day btn counts
  document.querySelectorAll('.day-btn').forEach(btn => {
    const day = btn.textContent.replace(/[0-9]/g,'').trim() ? null : null;
  });
}

// ── Flashcard Tab ──────────────────────────────────────────────
function renderFlashcard() {
  const words = getDayWords(state.selectedDay);
  const w = words[state.cardIndex];
  const knownCount = words.filter(x => state.known[`${x.day}_${x.word}`]).length;

  if (!w) {
    document.getElementById('app').innerHTML = `
      <div class="day-grid">${dayGrid(state.selectedDay)}</div>
      <div class="result-screen">
        <h2>오늘의 카드 완료!</h2>
        <p style="color:var(--muted);margin:8px 0">${knownCount}개 암기 완료</p>
        <button class="btn btn-primary" style="margin-top:18px" onclick="state.cardIndex=0;state.flipped=false;renderCurrent()">다시 학습</button>
      </div>`;
    return;
  }

  const pct = Math.round(state.cardIndex / words.length * 100);
  document.getElementById('app').innerHTML = `
    <div class="day-grid">${dayGrid(state.selectedDay)}</div>
    <div class="flashcard-area">
      <div class="card-counter">${state.cardIndex + 1} / ${words.length} · 암기 ${knownCount}개</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="flashcard${state.flipped ? ' flipped' : ''}" id="fc" onclick="flipCard()">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="word">${escH(w.word)}</div>
            <div class="pos-badge">${escH(w.pos)}</div>
            <div class="hint">탭하여 뜻 확인</div>
          </div>
          <div class="card-face card-back">
            <div class="back-word">${escH(w.word)} ${escH(w.pos)}</div>
            <div class="back-meaning">${escH(w.meaning)}</div>
            <div class="back-example">${escH(w.example)}</div>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-dontknow" onclick="markCard(false)">모르겠어요</button>
        <button class="btn btn-skip" onclick="nextCard()">건너뛰기</button>
        <button class="btn btn-know" onclick="markCard(true)">알았어요!</button>
      </div>
    </div>`;
}

function flipCard() {
  state.flipped = !state.flipped;
  const fc = document.getElementById('fc');
  if (fc) fc.className = 'flashcard' + (state.flipped ? ' flipped' : '');
}
function nextCard() {
  const words = getDayWords(state.selectedDay);
  state.cardIndex = Math.min(state.cardIndex + 1, words.length);
  state.flipped = false;
  renderCurrent();
}
function markCard(known) {
  const words = getDayWords(state.selectedDay);
  const w = words[state.cardIndex];
  if (w) { state.known[`${w.day}_${w.word}`] = known; saveKnown(); }
  nextCard();
}

// ── Quiz Tab ───────────────────────────────────────────────────
function startQuiz(day) {
  const words = getDayWords(day).sort(() => Math.random() - .5).slice(0, 20);
  state.quizWords = words;
  state.quizIndex = 0;
  state.quizScore = 0;
  state.quizTotal = words.length;
  state.showResult = false;
  state.quizDay = day;
  renderCurrent();
}

function renderQuiz() {
  if (state.showResult) {
    const pct = Math.round(state.quizScore / state.quizTotal * 100);
    document.getElementById('app').innerHTML = `
      <div class="result-screen">
        <h2>퀴즈 완료!</h2>
        <div class="score-big">${pct}%</div>
        <p style="color:var(--muted);margin:8px 0">${state.quizScore} / ${state.quizTotal} 정답</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:22px">
          <button class="btn btn-primary" onclick="startQuiz('${state.quizDay}')">다시 풀기</button>
          <button class="btn btn-skip" onclick="state.quizWords=[];state.showResult=false;renderCurrent()">날 선택</button>
        </div>
      </div>`;
    return;
  }

  if (state.quizWords.length === 0) {
    const btns = getAllDays().map(d => `<div class="day-btn" onclick="startQuiz('${d}')">${d}<div class="count">20문제</div></div>`).join('');
    document.getElementById('app').innerHTML = `<div style="font-weight:700;margin-bottom:12px">퀴즈할 날을 선택하세요</div><div class="day-grid">${btns}</div>`;
    return;
  }

  const w = state.quizWords[state.quizIndex];
  const allMeanings = [...new Set(VOCAB.map(x => x.meaning))];
  const wrong = allMeanings.filter(m => m !== w.meaning).sort(() => Math.random() - .5).slice(0, 3);
  const options = [w.meaning, ...wrong].sort(() => Math.random() - .5);
  const pct = Math.round(state.quizIndex / state.quizTotal * 100);

  document.getElementById('app').innerHTML = `
    <div class="quiz-area">
      <div class="quiz-score">문제 ${state.quizIndex + 1} / ${state.quizTotal} · 정답 ${state.quizScore}개</div>
      <div class="progress-bar" style="max-width:540px;width:100%"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="quiz-question">
        <div class="quiz-word">${escH(w.word)}</div>
        <div class="quiz-pos">${escH(w.pos)}</div>
      </div>
      <div class="quiz-options">
        ${options.map(o => `<div class="quiz-opt" onclick="answerQuiz(this,'${escA(o)}','${escA(w.meaning)}')">${escH(o)}</div>`).join('')}
      </div>
    </div>`;
}

function escA(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function answerQuiz(el, chosen, correct) {
  if (el.classList.contains('answered')) return;
  document.querySelectorAll('.quiz-opt').forEach(e => e.classList.add('answered'));
  if (chosen === correct) { el.classList.add('correct'); state.quizScore++; }
  else {
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(e => { if (e.textContent.trim() === correct) e.classList.add('correct'); });
  }
  setTimeout(() => {
    state.quizIndex++;
    if (state.quizIndex >= state.quizTotal) state.showResult = true;
    renderCurrent();
  }, 900);
}

// ── Stats Tab ──────────────────────────────────────────────────
function renderStats() {
  const days = getAllDays();
  const total = VOCAB.length;
  const known = getTotalKnown();
  const pct = Math.round(known / total * 100);
  const dayStats = days.map(d => {
    const ws = getDayWords(d);
    const k = ws.filter(w => state.known[`${w.day}_${w.word}`]).length;
    return { day: d, total: ws.length, known: k, pct: Math.round(k/ws.length*100) };
  });
  const bars = dayStats.map(ds => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      <div style="width:56px;font-size:.75rem;color:var(--muted);text-align:right">${ds.day}</div>
      <div style="flex:1;height:16px;background:var(--border);border-radius:8px;overflow:hidden">
        <div style="height:100%;width:${ds.pct}%;background:${ds.pct===100?'var(--success)':ds.pct>50?'var(--primary)':'var(--warning)'};border-radius:8px;transition:width .5s"></div>
      </div>
      <div style="width:38px;font-size:.75rem;color:var(--muted)">${ds.known}/${ds.total}</div>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="stats-card">
      <h3>전체 진행률</h3>
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:3rem;font-weight:900;color:#1e3a5f">${pct}%</div>
        <div style="color:var(--muted);margin-top:4px">${known} / ${total} 단어 암기</div>
      </div>
      <div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:12px 0">
        <div style="height:100%;width:${pct}%;background:#1e3a5f;border-radius:5px;transition:width 1s"></div>
      </div>
    </div>
    <div class="stats-card">
      <h3>일별 진행률</h3>${bars}
    </div>
    <div class="stats-card" style="display:flex;gap:12px;flex-wrap:wrap;text-align:center">
      <div style="flex:1;min-width:100px"><div style="font-size:1.8rem;font-weight:800;color:var(--success)">${dayStats.filter(d=>d.pct===100).length}</div><div style="font-size:.82rem;color:var(--muted)">완료</div></div>
      <div style="flex:1;min-width:100px"><div style="font-size:1.8rem;font-weight:800;color:var(--primary)">${dayStats.filter(d=>d.pct>0&&d.pct<100).length}</div><div style="font-size:.82rem;color:var(--muted)">진행 중</div></div>
      <div style="flex:1;min-width:100px"><div style="font-size:1.8rem;font-weight:800;color:var(--muted)">${dayStats.filter(d=>d.pct===0).length}</div><div style="font-size:.82rem;color:var(--muted)">미시작</div></div>
      <div style="flex:1;min-width:100px"><div style="font-size:1.8rem;font-weight:800;color:var(--warning)">${total-known}</div><div style="font-size:.82rem;color:var(--muted)">남은 단어</div></div>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="btn btn-dontknow" onclick="if(confirm('모든 학습 기록을 초기화할까요?')){localStorage.removeItem('toefl_known');state.known={};renderCurrent();updateHeader();}">학습 기록 초기화</button>
    </div>`;
}

// ── Router ─────────────────────────────────────────────────────
function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.className = 'tab' + (['book','flashcard','quiz','stats'][i] === tab ? ' active' : '');
  });
  if (tab !== 'quiz') { state.quizWords = []; state.showResult = false; }
  renderCurrent();
}

function renderCurrent() {
  updateHeader();
  if (state.currentTab === 'book') renderBook();
  else if (state.currentTab === 'flashcard') renderFlashcard();
  else if (state.currentTab === 'quiz') renderQuiz();
  else renderStats();
}

renderCurrent();
</script>
</body>
</html>
